{% extends 'base.html' %}
{% block content %}
<div class="main-container">
    <div class="auth-card">
        <h2><i class="fa fa-user-plus"></i> Daftar Akun</h2>
        <p class="auth-subtitle">Buat akun baru sebagai pembeli atau penjual</p>
        <form method="POST" class="styled-form">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" name="full_name" placeholder="Nama lengkap Anda">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="username unik" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@contoh.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Daftar Sebagai</label>
                <select name="role">
                    <option value="user">User (Pembeli)</option>
                    <option value="seller">Seller (Penjual)</option>
                </select>
            </div>
            <button type="submit" class="btn-admin-submit">Daftar Sekarang</button>
        </form>
        <p class="auth-switch">Sudah punya akun? <a href="{{ url_for('login') }}">Login di sini</a></p>
    </div>
</div>
{% endblock %}
