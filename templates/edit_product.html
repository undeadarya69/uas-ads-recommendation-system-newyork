{% extends 'base.html' %}
{% block content %}
<div class="main-container">
    <div class="auth-card" style="max-width: 560px;">
        <h2><i class="fa fa-pen"></i> Edit Produk</h2>
        <form method="POST" class="styled-form">
            <div class="form-group">
                <label>Nama Produk</label>
                <input type="text" name="name" value="{{ product.name }}" required>
            </div>
            <div class="form-group">
                <label>Subkategori (Kategori &rsaquo; Subkategori)</label>
                <select name="subkategori_id" required>
                    {% for kat in all_kategori %}
                    <optgroup label="{{ kat.nama_kategori }}">
                        {% for sub in kat.subkategoris %}
                        <option value="{{ sub.id }}" {% if product.subkategori_id == sub.id %}selected{% endif %}>{{ sub.nama_subkategori }}</option>
                        {% endfor %}
                    </optgroup>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Harga ($ USD)</label>
                <input type="number" step="0.01" name="price" value="{{ product.price }}" required>
            </div>
            <div class="form-group">
                <label>Stok</label>
                <input type="number" name="stock" value="{{ product.stock }}">
            </div>
            <div class="form-group">
                <label>Diskon (%)</label>
                <input type="number" name="discount_percent" value="{{ product.discount_percent }}" min="0" max="90">
            </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <textarea name="description" rows="2">{{ product.description }}</textarea>
            </div>
            <div class="form-group">
                <label>URL Gambar</label>
                <input type="text" name="image_url" value="{{ product.image_url }}">
            </div>
            <div class="form-group-checkbox">
                <input type="checkbox" name="is_new_arrival" id="is_new" {% if product.is_new_arrival %}checked{% endif %}>
                <label for="is_new">New Arrival</label>
            </div>
            <div class="form-group-checkbox">
                <input type="checkbox" name="is_best_seller" id="is_best" {% if product.is_best_seller %}checked{% endif %}>
                <label for="is_best">Best Seller</label>
            </div>
            <button type="submit" class="btn-admin-submit"><i class="fa fa-save"></i> Simpan Perubahan</button>
        </form>
        <p class="auth-switch"><a href="{{ url_for('seller_dashboard') }}">&larr; Kembali ke Dashboard</a></p>
    </div>
</div>
{% endblock %}
